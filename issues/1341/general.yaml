        communications:
          - date: 2026-05-04T13:16:06.970Z
            contents:
              en:
                type: doc
                content:
                  - type: paragraph
                    content:
                      - type: text
                        text: >-
                          The Government of the Republic of Kazakhstan and the
                          Government of the Russian Federation have concluded an
                          agreement on the joint use of the international E.164
                          numbering resource of the numbering zone “7”. This
                          Agreement is concluded for an indefinite period and
                          has been entered into force on 3 December 2025.
                  - type: paragraph
                    content:
                      - type: text
                        text: >-
                          Previously, the Agreement was concluded between the
                          communications authorities of the two countries. The
                          new Agreement has been signed between the Governments,
                          granting the parties an intergovernmental status.
                  - type: paragraph
                    content:
                      - type: text
                        text: >-
                          The previous Agreement stipulated a 6-month
                          notification period for either Party to terminate the
                          Agreement. Under the new Agreement, this notification
                          period has been extended to 24 months.
                  - type: paragraph
                    content:
                      - type: text
                        text: >-
                          This update emphasizes that the Republic of Kazakhstan
                          acts as an equal partner and is allocated the
                          following codes: +7 0, +7 6, +7 7.
                  - type: paragraph
                    content:
                      - type: text
                        text: >-
                          The authorized bodies for the implementation of this
                          Agreement are:
                  - type: paragraph
                    content:
                      - type: text
                        text: "\_\_\_\_\_\_\_\_\_\_\_\_\_ for the Republic of Kazakhstan - the Ministry of Digital Development, Innovations and Aerospace Industry of the Republic of Kazakhstan;"
                  - type: paragraph
                    content:
                      - type: text
                        text: "\_\_\_\_\_\_\_\_\_\_\_\_\_ for the Russian Federation - the Ministry of Digital Development, Communications and Mass Media of the Russian Federation."
                  - type: paragraph
                    content:
                      - type: text
                        text: >-
                          Under the Agreement, the Russian Federation and the
                          Republic of Kazakhstan retain the numbering zone “7”,
                          pursuant to the Table of assigned codes of the
                          numbering zone “7”.
                  - type: paragraph
