                          The Tiantong international numbering service is based
                          on the Tiantong satellite mobile communication system
                          operated by China Telecom. It is a numbering resource
                          (882 52 number segment, 13-digit number) assigned by
                          the International Telecommunication Union (ITU) for
                          China Telecom to run global operations. Currently, it
                          has the capability to provide voice, SMS, and Internet
                          of Things services over satellite to users in
                          countries/geographic areas covered by the Tiantong
                          satellite network. China Telecommunications
                          Corporation Satellite Communications Branch is the
                          operator of this business.
