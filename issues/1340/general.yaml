                          - type: strong
                        text: 1- General Information
                  - type: paragraph
                    content:
                      - type: text
                        text: 'The E.164 numbering Plan of Iran:'
                  - type: paragraph
                    content:
                      - type: text
                        text: "·\_\_\_\_\_\_ Country Code: +98"
                  - type: paragraph
                    content:
                      - type: text
                        text: "·\_\_\_\_\_\_ International Prefix: \"00\""
                  - type: paragraph
                    content:
                      - type: text
                        text: "·\_\_\_\_\_\_ National Prefix: \"0\""
                  - type: paragraph
                    content:
                      - type: text
                        text: >-
                          For national calls, it must be dialled before all
                          telephone numbers except short numbers.
                  - type: paragraph
                    content:
                      - type: text
                        text: It must not be dialled from abroad.
                  - type: paragraph
                    content:
                      - type: text
                        text: "·\_\_\_\_\_\_ National destination Code: 2 digits."
