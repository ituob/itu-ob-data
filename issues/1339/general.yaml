                      - type: text
                        text: The
                      - type: text
                        marks:
                          - type: em
                        text: ' Ascension Island Government, '
                      - type: text
                        text: >-
                          Georgetown, announces the following updated National
                          Numbering Plan of Ascension (country code +247):
                  - type: paragraph
                    content:
                      - type: text
                        text: >-
                          As from 1 March 2026, the length of all +247 numbers
                          has increased to a uniform 11 digits (including the
                          country code +247) to ensure compliance with
                          international numbering formats. The digits ‘247’ have
                          been inserted as a prefix at the beginning of the
                          subscriber number for all numbers from the +247
                          national numbering plan (Geographic, Mobile and
                          Non-geographic numbers). For example, a number that
                          was previously +247 4XXXX is now +247 247 4XXXX.
